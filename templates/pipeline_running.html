<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Configuración</title>

  <style>
    :root {
      --bg: #0b1016;
      --panel: #0f1a24;
      --panel-2: #0b1320;
      --accent: #4dbdd7;
      --accent-2: #00ffa6;
      --danger: #ff3b3b;
      --text: #e9f1f5;
      --muted: #8aa4b5;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      height: auto;
      display: flex;
      flex-direction: column;
      font-family: "Segoe UI", Roboto, Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(1200px 800px at 70% -10%, #123 0%, var(--bg) 60%),
        linear-gradient(#0a0f14, #06090d);
    }

    h1 {
      text-align: center;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: var(--muted);
      font-size: 2.5rem;
      margin-top: 30px;
    }

    .options {
      display: flex;
      justify-content: center;
      width: 100%;
      height: 100%;
    }

    .container {
      width: 90%;
      padding: 24px;
      display: flex;
      justify-content: center;
    }

    .panel {
      background: linear-gradient(180deg, rgba(255, 255, 255, .02), rgba(0, 0, 0, .25)),
                  linear-gradient(180deg, var(--panel), var(--panel-2));
      border: 1px solid rgba(0, 209, 255, .15);
      border-radius: 18px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, .45);
      width: 100%;
      padding: 30px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .info {
      color: var(--muted);
      text-align: center;
      width: 100%;
    }

    /* ===== BOTÓN ===== */
    .button {
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, .08);
      background: linear-gradient(180deg, rgba(255, 255, 255, .06), rgba(0, 209, 255, 0.15));
      box-shadow: 0 6px 20px rgba(0, 0, 0, .35);
      transition: transform .2s ease, box-shadow .3s ease;
      color: var(--accent);
      font-size: 1.1rem;
      padding: 10px 20px;
      cursor: pointer;
      text-decoration: none;
    }

    .button:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 30px rgba(0, 0, 0, .5),
                  0 0 0 6px rgba(0, 209, 255, .25);
    }

    /* ===== LOADING / FINISHED ===== */
    #loadingGif {
      width: 80px;
    }

    #finishedText {
      display: none;
      font-size: 1.2rem;
      font-weight: bold;
      color: var(--accent-2);
    }

    /* ===== LOGS ===== */
    .logs-container {
      background: #0f1a24;
      border: 1px solid rgba(0, 209, 255, 0.15);
      border-radius: 12px;
      padding: 16px;
      margin-top: 10px;
      width: 100%;
      height: 450px;
      overflow-y: auto;
      font-family: monospace;
      white-space: pre-wrap;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.35);
    }

    /* ✅ SCROLL PERSONALIZADO */
    .logs-container::-webkit-scrollbar {
      width: 10px;
    }

    .logs-container::-webkit-scrollbar-track {
      background: #0b1320;
      border-radius: 10px;
    }

    .logs-container::-webkit-scrollbar-thumb {
      background: linear-gradient(180deg, #00d1ff, #00ffa6);
      border-radius: 10px;
    }

    .logs-container::-webkit-scrollbar-thumb:hover {
      background: linear-gradient(180deg, #00ffa6, #00d1ff);
    }

    .job-box {
      background: rgba(0, 0, 0, 0.35);
      border-left: 4px solid var(--accent);
      padding: 10px 12px;
      margin-bottom: 12px;
      border-radius: 8px;
    }

    .job-title {
      font-weight: bold;
      margin-bottom: 6px;
      color: var(--accent);
    }

    .log-line {
      color: var(--text);
      font-size: 0.75rem;
      line-height: 1.2rem;
      overflow: auto;
    }

    #errors {
      width: 100%;
    }

    .error-message {
      color: var(--danger);
      font-weight: bold;
      margin-top: 8px;
    }
  </style>
</head>

<body>

  <h1>Panel de Control</h1>

  <div class="options">
    <section class="container">
      <div class="panel">

        <h2 id="pipelineTitle">Modelos Clásicos</h2>

        <!-- GIF DE CARGA -->
        <img id="loadingGif" src="{{ url_for('static', filename='img/Carga1.gif') }}" alt="Carga">

        <!-- TEXTO FINISHED -->
        <div id="finishedText">✅ Entrenamiento finalizado</div>

        <!-- LOGS -->
        <div id="logs" class="logs-container"></div>

        <div id="errors"></div>

        <a href="{{ url_for('main.model_info') }}" class="button">
          Volver
        </a>

      </div>
    </section>
  </div>

  <!-- SOCKET.IO -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.6.1/socket.io.js"></script>

  <script>
    if (!window.socket) {
      window.socket = io("/pipeline", {
        transports: ["websocket", "polling"]
      });
    }

    const socket = window.socket;
    const logsContainer = document.getElementById("logs");
    const jobsMap = {};

    socket.on("connect", () => {
      console.log("🔥 Conectado a /pipeline:", socket.id);
    });

    socket.on("artifacts_ready", (data) => {
      console.log("✅ Artifacts ready:", data);

      document.getElementById("loadingGif").style.display = "none";
      document.getElementById("finishedText").style.display = "block";
      document.getElementById("pipelineTitle").textContent =
        "Modelos Clásicos (Completado)";
    });

    socket.on("job_log", (data) => {
      let jobDiv = jobsMap[data.job];

      if (!jobDiv) {
        jobDiv = document.createElement("div");
        jobDiv.classList.add("job-box");

        const title = document.createElement("div");
        title.classList.add("job-title");
        title.textContent = `${data.job} (${data.status})`;

        const logContent = document.createElement("div");
        logContent.classList.add("log-line");

        jobDiv.appendChild(title);
        jobDiv.appendChild(logContent);
        logsContainer.appendChild(jobDiv);

        jobsMap[data.job] = jobDiv;
      } else {
        jobDiv.querySelector(".job-title").textContent =
          `${data.job} (${data.status})`;
      }

      const logContent = jobDiv.querySelector(".log-line");
      logContent.innerHTML += data.log.replace(/\n/g, "<br>");

      logsContainer.scrollTop = logsContainer.scrollHeight;
    });

    socket.on("error", (data) => {
      const errDiv = document.createElement("div");
      errDiv.classList.add("error-message");
      errDiv.textContent = data.message;
      document.getElementById("errors").appendChild(errDiv);
    });
  </script>

</body>
</html>
