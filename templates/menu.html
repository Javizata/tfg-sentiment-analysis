<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menú Responsive Premium</title>
<style>
  body {
    margin: 0;
    font-family: 'Roboto', Arial, sans-serif;
    background-color: #f5f5f5;
  }

  .menu {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background-color: #6200ea; /* Color Material Design */
    padding: 10px 20px;
    box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    position: relative;
  }

  .logo {
    color: white;
    font-size: 22px;
    font-weight: bold;
  }

  .menu-links {
    display: flex;
    gap: 20px;
    transition: max-height 0.5s ease, opacity 0.5s ease;
    overflow: hidden;
    opacity: 1;
  }

  .menu-links a {
    color: white;
    text-decoration: none;
    padding: 10px 15px;
    border-radius: 4px;
    transition: background-color 0.3s;
  }

  .menu-links a:hover {
    background-color: rgba(255,255,255,0.2);
  }

  .hamburger {
    display: none;
    cursor: pointer;
    width: 30px;
    height: 30px;
  }

  .hamburger svg {
    fill: white;
    width: 100%;
    height: 100%;
    transition: transform 0.4s ease;
  }

  .hamburger.active svg {
    transform: rotate(90deg);
  }

  @media (max-width: 768px) {
    .menu-links {
      flex-direction: column;
      width: 20%;
      max-height: 0;
      opacity: 0;
      background-color: #6200ea;
      position: absolute;
      top: 60px;
      left: 0;
      padding: 10px 0;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }

    .menu-links.show {
      max-height: 500px;
      opacity: 1;
    }

    .hamburger {
      display: block;
    }
  }
</style>
</head>
<body>

<nav class="menu">
  <div class="hamburger" id="hamburger">
    <!-- Icono SVG hamburguesa -->
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M3 6h18v2H3V6zm0 5h18v2H3v-2zm0 5h18v2H3v-2z"/></svg>
  </div>

  <div class="logo">MiWeb Premium</div>
  <div class="menu-links" id="menu-links">
    <a href="#">Inicio</a>
    <a href="#">Productos</a>
    <a href="#">Servicios</a>
    <a href="#">Contacto</a>
  </div>
</nav>

<script>
  
  const hamburger = document.getElementById('hamburger');
  const menuLinks = document.getElementById('menu-links');

  hamburger.addEventListener('click', () => {
    hamburger.classList.toggle('active');
    menuLinks.classList.toggle('show');
  });
</script>

</body>
</html>
